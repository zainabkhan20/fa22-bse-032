name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "setup-automation" ]
  pull_request:
    branches: [ "main", "setup-automation" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub se code fetch karna
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js setup karna (React Native/Expo ke liye zaroori hai)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Dependencies install karna
      - name: Install dependencies
        run: npm install

      # 4. Simple check (Verify if App.js exists)
      - name: Verify Files
        run: |
          ls -R
          echo "Files verified successfully!"